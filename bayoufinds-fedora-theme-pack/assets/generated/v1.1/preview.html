<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="copyright" content="Copyright (c) 2026 Wonder Piece Studio. All Rights Reserved.">
    <title>BayouFinds Aqua Pro v1.1 Preview</title>
    <style>
      /*
      Copyright (c) 2026 Wonder Piece Studio.
      All Rights Reserved.
      */
      :root { color-scheme: dark; --bg: #090e13; --panel: #121a22; --line: #263541; --text: #edf4f0; --muted: #91a5b2; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, Segoe UI, Cantarell, Arial, sans-serif; background: var(--bg); color: var(--text); }
      main { width: min(1180px, calc(100% - 48px)); margin: 0 auto; padding: 54px 0; }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 3.25rem); }
      p { color: var(--muted); margin: 0 0 28px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
      .card { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); overflow: hidden; }
      img { display: block; width: 100%; height: auto; }
      .label { padding: 16px 18px 18px; color: var(--muted); }
      footer { margin-top: 32px; color: var(--muted); font-size: 0.86rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>BayouFinds Aqua Pro v1.1</h1>
      <p>User-level Fedora 42 GNOME account standard with folders, file-type icons, wallpaper, backup, validation, and rollback.</p>
      <section class="grid" aria-label="BayouFinds Aqua Pro v1.1 previews">
        <article class="card">
          <img src="./file-type-preview.png" alt="File type icon preview">
          <div class="label">File-type icon standard</div>
        </article>
        <article class="card">
          <img src="./home-directory-standard.png" alt="Home directory folder standard">
          <div class="label">Home directory folder mockup</div>
        </article>
      </section>
      <footer>Copyright (c) 2026 Wonder Piece Studio. All Rights Reserved.</footer>
    </main>
  </body>
</html>
