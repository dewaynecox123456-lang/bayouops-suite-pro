  </defs>
  <image href="../assets/generated/bayou-ops-background-base.png" x="0" y="0" width="3840" height="2160" preserveAspectRatio="xMidYMid slice"/>
  <rect width="3840" height="2160" fill="url(#shade)"/>
  <rect width="3840" height="2160" fill="#05080c" opacity="0.42"/>
  <g opacity="0.35" stroke="url(#lineGradient)" stroke-width="4" fill="none">
    <path d="M1720 430h420l110 110h360"/>
    <path d="M1600 600h310l80 80h510"/>
