<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160" role="img" aria-labelledby="title desc">
  <title id="title">BayouFinds Fedora 42 enterprise wallpaper</title>
  <desc id="desc">Dark BayouOps workstation wallpaper with enterprise monitoring graphics and branded text.</desc>
  <defs>
    <linearGradient id="shade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05080c" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#0d151c" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#030507" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="0" x2="1">
      <stop offset="0" stop-color="#72c689" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#72c689" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5f8fb8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="markGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5fbf7a"/>
      <stop offset="1" stop-color="#5f8fb8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
