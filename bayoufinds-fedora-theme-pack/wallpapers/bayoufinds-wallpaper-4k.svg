    <path d="M2420 1090h420l120-120h500"/>
    <path d="M2300 1260h520l100 100h390"/>
  </g>
  <g opacity="0.24" fill="#5f8fb8">
    <rect x="2450" y="470" width="360" height="170" rx="12"/>
    <rect x="2860" y="470" width="360" height="170" rx="12"/>
    <rect x="2530" y="745" width="640" height="320" rx="18"/>
    <rect x="2380" y="1180" width="980" height="420" rx="18"/>
  </g>
